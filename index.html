<!DOCTYPE html>
<html>
<head>
    <title>Student Notes Sharing Portal</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

<h1>Student Notes Sharing Portal</h1>

</div>

<script src="script.js"></script>

</body>
</html>
